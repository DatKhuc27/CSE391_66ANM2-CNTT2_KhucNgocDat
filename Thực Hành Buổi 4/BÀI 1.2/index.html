<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students information Mark</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .input-group, .filter-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .input-group input, .filter-group input, .filter-group select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #nameInput, #searchInput { flex: 2; }
        #gradeInput { flex: 1; }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .delete-btn {
            background-color: #dc3545;
            padding: 5px 10px;
            font-size: 12px;
        }
        .delete-btn:hover { background-color: #c82333; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th { background-color: #f2f2f2; }
        #sortGrade { cursor: pointer; user-select: none; }
        #sortGrade:hover { background-color: #e2e2e2; }
        .row-warning { background-color: #fff3cd; }
        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Manage Students information Mark</h2>
    
    <div class="input-group">
        <input type="text" id="nameInput" placeholder="Tên đầy đủ">
        <input type="number" id="gradeInput" placeholder="Điểm (0-10)" step="0.1" min="0" max="10">
        <button id="addBtn">Thêm</button>
    </div>

    <div class="filter-group">
        <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên...">
        <select id="filterSelect">
            <option value="All">Tất cả xếp loại</option>
            <option value="Giỏi">Giỏi</option>
            <option value="Khá">Khá</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Yếu">Yếu</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên đầy đủ</th>
                <th id="sortGrade">Điểm <span id="sortIcon"></span></th>
                <th>Xếp loại</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="studentBody">
        </tbody>
    </table>

    <div class="stats">
        <span>Đang hiển thị: <span id="totalCount">0</span></span>
        <span>Điểm trung bình (DS hiện tại): <span id="avgGrade">0.00</span></span>
    </div>
</div>

<script>
    let students = [];
    let filteredStudents = [];
    let sortOrder = ''; 

    const nameInput = document.getElementById('nameInput');
    const gradeInput = document.getElementById('gradeInput');
    const addBtn = document.getElementById('addBtn');
    
    const searchInput = document.getElementById('searchInput');
    const filterSelect = document.getElementById('filterSelect');
    const sortGrade = document.getElementById('sortGrade');
    const sortIcon = document.getElementById('sortIcon');
    
    const studentBody = document.getElementById('studentBody');
    const totalCountEl = document.getElementById('totalCount');
    const avgGradeEl = document.getElementById('avgGrade');

    function getClassification(grade) {
        if (grade >= 8.5) return "Giỏi";
        if (grade >= 7.0) return "Khá";
        if (grade >= 5.0) return "Trung bình";
        return "Yếu";
    }

    function applyFilters() {
        const keyword = searchInput.value.trim().toLowerCase();
        const filterRank = filterSelect.value;

        filteredStudents = students.filter(student => {
            const matchName = student.name.toLowerCase().includes(keyword);
            const matchRank = filterRank === 'All' || student.classification === filterRank;
            return matchName && matchRank;
        });

        if (sortOrder === 'asc') {
            filteredStudents.sort((a, b) => a.grade - b.grade);
            sortIcon.textContent = '▲';
        } else if (sortOrder === 'desc') {
            filteredStudents.sort((a, b) => b.grade - a.grade);
            sortIcon.textContent = '▼';
        } else {
            sortIcon.textContent = '';
        }

        renderTable();
    }

    function renderTable() {
        studentBody.innerHTML = '';
        let totalScore = 0;

        if (filteredStudents.length === 0) {
            studentBody.innerHTML = '<tr><td colspan="5" style="color: #666; font-style: italic;">Không có kết quả</td></tr>';
            totalCountEl.textContent = '0';
            avgGradeEl.textContent = '0.00';
            return;
        }

        filteredStudents.forEach((student, index) => {
            const tr = document.createElement('tr');
            if (student.grade < 5.0) {
                tr.classList.add('row-warning');
            }

            tr.innerHTML = `
                <td>${index + 1}</td>
                <td>${student.name}</td>
                <td>${student.grade.toFixed(1)}</td>
                <td>${student.classification}</td>
                <td><button class="delete-btn" data-id="${student.id}">Xóa</button></td>
            `;
            studentBody.appendChild(tr);
            totalScore += student.grade;
        });

        totalCountEl.textContent = filteredStudents.length;
        avgGradeEl.textContent = (totalScore / filteredStudents.length).toFixed(2);
    }

    function addStudent() {
        const name = nameInput.value.trim();
        const grade = parseFloat(gradeInput.value);

        if (!name) {
            alert("Vui lòng nhập họ tên sinh viên!");
            nameInput.focus();
            return;
        }
        if (isNaN(grade) || grade < 0 || grade > 10) {
            alert("Vui lòng nhập điểm hợp lệ (từ 0 đến 10)!");
            gradeInput.focus();
            return;
        }

        students.push({
            id: Date.now(),
            name: name,
            grade: grade,
            classification: getClassification(grade)
        });

        nameInput.value = '';
        gradeInput.value = '';
        nameInput.focus();
        
        applyFilters();
    }

    addBtn.addEventListener('click', addStudent);
    
    gradeInput.addEventListener('keypress', e => { 
        if (e.key === 'Enter') addStudent(); 
    });

    searchInput.addEventListener('input', applyFilters);
    filterSelect.addEventListener('change', applyFilters);

    sortGrade.addEventListener('click', () => {
        if (sortOrder === '' || sortOrder === 'desc') {
            sortOrder = 'asc';
        } else {
            sortOrder = 'desc';
        }
        applyFilters();
    });

    studentBody.addEventListener('click', function(e) {
        if (e.target.classList.contains('delete-btn')) {
            const idToDelete = Number(e.target.getAttribute('data-id'));
            students = students.filter(student => student.id !== idToDelete);
            applyFilters();
        }
    });

</script>
</body>
</html>
